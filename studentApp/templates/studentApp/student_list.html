<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
</head>
<body>
    <h1>Student List</h1>

    {% if students %}
        <table border="1">
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Roll Number</th>
                <th>Department</th>
            </tr>

            {% for student in students %}
            <tr>
                <td>
                    <a href="{% url 'student_detail' student.id %}">
                        {{ student.name }}
                    </a>
                </td>
                <td>{{ student.age }}</td>
                <td>{{ student.roll_number }}</td>
                <td>{{ student.department.dept_name }}</td>
            </tr>
            {% endfor %}

        </table>
    {% else %}
        <p>No students available.</p>
    {% endif %}

</body>
</html>
